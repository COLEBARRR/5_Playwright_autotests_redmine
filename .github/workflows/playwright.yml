name: Playwright Tests with Allure Report

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test --project=chromium || true
        env:
          REDMINE_USER: ${{ secrets.REDMINE_USER }}
          REDMINE_PASS: ${{ secrets.REDMINE_PASS }}
          REDMINE_2FA_SECRET: ${{ secrets.REDMINE_2FA_SECRET }}

      - name: Pre-create allure-history and index redirect
        if: always()
        run: |
          mkdir -p allure-history
          echo '<meta http-equiv="refresh" content="0;URL='${{ github.run_number }}'/">' > allure-history/index.html

      - name: Allure Report Action
        uses: simple-elf/allure-report-action@master
        if: always()
        id: allure-report
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: allure-history

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4